function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function getLanguages(repos){
  const set = new Set();
  repos.forEach(r=>{ if(r.language) set.add(r.language); });
  return Array.from(set).sort();
}

function repoHtml(r){
  const full = '<a href="'+r.html_url+'" target="_blank" rel="noopener noreferrer">'+escapeHtml(r.full_name)+'</a>';
  const desc = r.description ? '<div>'+escapeHtml(r.description)+'</div>' : '';
  const topics = (r.topics || []).map(t => '<span class="badge">'+escapeHtml(t)+'</span>').join(' ');
  const language = r.language ? '<span style="margin-right:8px">'+escapeHtml(r.language)+'</span>' : '';
  const tagsHtml = '';
  const meta = '<div class="meta">'+language+'⭐ '+(r.stargazers_count||0)+' • Forks: '+(r.forks_count||0)+' • Updated: '+(r.pushed_at? new Date(r.pushed_at).toLocaleString() : 'n/a')+'</div>';
  return '<div class="repo"><div class="main"><h3>'+full+'</h3>'+desc+'<div style="margin-top:8px">'+topics+'<div class="tags">'+tagsHtml+'</div></div>'+meta+'</div><div style="text-align:right"><div><a href="'+r.html_url+'" target="_blank">Open</a></div></div></div>';
}

function matchesFilter(r, q, lang){
  const text = (r.full_name+' '+(r.description||'')+' '+(r.topics||[]).join(' ')).toLowerCase();
  if(q && !text.includes(q.toLowerCase())) return false;
  if(lang && r.language !== lang) return false;
  return true;
}

function sortRepos(repos, mode){
  if(mode === 'pushed_desc') return repos.sort((a,b)=> new Date(b.pushed_at) - new Date(a.pushed_at));
  if(mode === 'stars_desc') return repos.sort((a,b)=> (b.stargazers_count||0) - (a.stargazers_count||0));
  if(mode === 'stars_asc') return repos.sort((a,b)=> (a.stargazers_count||0) - (b.stargazers_count||0));
  if(mode === 'name_asc') return repos.sort((a,b)=> a.full_name.localeCompare(b.full_name));
  return repos;
}

function render(){
  const q = document.getElementById('search').value.trim();
  const lang = document.getElementById('languageFilter').value;
  const sortBy = document.getElementById('sortBy').value;
  let out = REPOS.slice();
  out = out.filter(r => matchesFilter(r, q, lang));
  out = sortRepos(out, sortBy);
  const list = document.getElementById('list');
  list.innerHTML = out.map(r=>repoHtml(r)).join('\n') || '';
  document.getElementById('empty').style.display = out.length ? 'none' : 'block';
  document.getElementById('count').textContent = out.length + ' / ' + REPOS.length;
}

function init(){
  const langs = getLanguages(REPOS);
  const sel = document.getElementById('languageFilter');
  langs.forEach(l => { const o = document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
  document.getElementById('search').addEventListener('input', render);
  document.getElementById('languageFilter').addEventListener('change', render);
  document.getElementById('sortBy').addEventListener('change', render);
  document.getElementById('downloadHtml').addEventListener('click', ()=> {
    const html = '<!doctype html>' + document.documentElement.outerHTML;
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'github-stars-export.html'; a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('exportJson').addEventListener('click', ()=> {
    const data = { exported_at: (new Date()).toISOString(), repos: REPOS };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'github-stars.json'; a.click();
    URL.revokeObjectURL(url);
  });
  render();
}
window.addEventListener('load', init);
</script>
